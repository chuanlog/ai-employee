server:
  port: 9900
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

file:
  upload:
    path: ./uploads
    allowed-extensions: txt,md

milvus:
  host: 47.116.141.4 #这里配你部署docker容器的虚拟机的地址
  port: 19530
  username: ""
  password: ""
  database: default
  timeout: 10000

# Spring AI Alibaba DashScope 配置
spring:
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}  # 这里配阿里云的api key
      chat:
        options:
          timeout: 180000  # 超时时间180秒（3分钟）
      retry:
        max-attempts: 3  # 最大重试次数
        backoff:
          initial-interval: 2000  # 初始重试间隔2秒
          multiplier: 2  # 重试间隔倍数
          max-interval: 10000  # 最大重试间隔10秒
  data:
    redis:
      host: 47.116.141.4
      port: 6379
      password: chenyongchuan0019
      timeout: 5s
  datasource:
    url: jdbc:mysql://47.116.141.4:3306/ai_employee?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: chenyongchuan0019
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:schema.sql
  jpa:
    defer-datasource-initialization: true
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
    
    # Spring AI MCP 客户端配置
    # 如果使用mock数据，请注释这部分内容(目前使用docker，这段不要管)
#    mcp:
#      client:
#        enabled: true
#        name: tencent-mcp-server
#        version: 1.0.0
#        request-timeout: 60s
#        type: ASYNC
#        sse:
#          connections:
#            tencent-cls:
#              url: https://mcp-api.tencent-cloud.com
#              sse-endpoint:   # 完整的SSE端点路径

# 阿里云 DashScope Embedding API 配置
dashscope:
  api:
    key: ${DASHSCOPE_API_KEY:}  # 从环境变量读取
  embedding:
    model: text-embedding-v4  # 阿里云文本向量化模型

# 文档分片配置
document:
  chunk:
    max-size: 800  # 每个分片最大字符数
    overlap: 100   # 分片之间的重叠字符数

# RAG 配置
rag:
  top-k: 3  # 检索返回的最相似文档数量
  model: "qwen3-max"  # 大语言模型名称

chat:
  session:
    ttl-hours: 168

mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: org.example.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: assign_id

# Prometheus 配置
prometheus:
  base-url: http://192.168.202.128:9090
  timeout: 10  # 超时时间（秒）
  mock-enabled: true # 是否启用 Mock 模式（用于测试）

# CLS 云日志服务配置
cls:
  mock-enabled: true  # 是否启用 Mock 模式（用于测试，设为 true 返回与告警关联的模拟日志数据）

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

jwt:
  secret: ai-employee-secret-key-2024-must-be-at-least-32-bytes-long-for-hs256
  expire: 86400000
